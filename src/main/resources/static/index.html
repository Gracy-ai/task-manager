<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ProFlow | Mon Espace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-700">

<aside class="w-72 bg-blue-700 flex flex-col shadow-xl">
    <div class="flex flex-col items-center py-10 bg-blue-800/50">
        <div class="w-20 h-20 mb-4 overflow-hidden rounded-2xl shadow-lg border-2 border-blue-400 bg-white flex items-center justify-center">
            <img src="/logo.png" alt="Logo ProFlow" class="object-contain w-full h-full p-2">
        </div>
        <h1 class="text-2xl font-black text-white tracking-tight uppercase">
            PRO<span class="text-blue-200">FLOW</span>
        </h1>
        <div class="h-1.5 w-12 bg-white rounded-full mt-2"></div>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-2">
        <p class="text-[10px] font-bold text-blue-200 uppercase tracking-widest ml-4 mb-4 opacity-70">Menu principal</p>

        <button id="btn-my-projects" onclick="switchTab('my-projects', this)"
                class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-blue-100">
            <i class="fa-solid fa-user-check"></i> Mes Projets
        </button>

        <button id="btn-all-projects" onclick="switchTab('all-projects', this)"
                class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-blue-100">
            <i class="fa-solid fa-globe"></i> Projets Entreprise
        </button>

        <button onclick="openCreateModal()"
                class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-blue-100">
            <i class="fa-solid fa-plus-circle"></i> Nouveau Projet
        </button>
    </nav>

    <div class="p-6 border-t border-blue-600/50">
        <button onclick="logout()" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl text-blue-100 hover:bg-red-500 hover:text-white font-bold transition-all">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Déconnexion
        </button>
    </div>
</aside>

<main class="flex-1 flex flex-col h-full overflow-hidden">
    <header class="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between">
        <div>
            <h2 id="current-title" class="text-xl font-bold text-slate-800">Chargement...</h2>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <p id="user-display" class="text-sm font-bold text-slate-700"></p>
                <p class="text-[10px] text-green-500 font-bold tracking-tighter uppercase">Mode Utilisateur</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
    </header>

    <div id="main-content" class="p-8 overflow-y-auto flex-1">
        <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </div>
</main>

<div id="create-modal-overlay" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">
        <h3 class="text-2xl font-black mb-6">Nouveau Projet</h3>
        <form id="create-project-form" class="space-y-4">
            <input id="new-project-name" placeholder="Nom du projet" required class="w-full p-3 border-2 rounded-xl focus:border-blue-500 outline-none">
            <textarea id="new-project-desc" placeholder="Description" class="w-full p-3 border-2 rounded-xl focus:border-blue-500 outline-none"></textarea>
            <input type="date" id="new-project-deadline" required class="w-full p-3 border-2 rounded-xl focus:border-blue-500 outline-none">
            <select id="new-project-members" multiple class="w-full p-3 border-2 rounded-xl h-32"></select>
            <div class="flex justify-end gap-3 pt-4">
                <button type="button" onclick="closeCreateModal()" class="px-5 py-2 font-bold text-slate-400">Annuler</button>
                <button type="submit" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold shadow-md hover:bg-blue-700">Créer</button>
            </div>
        </form>
    </div>
</div>

<div id="modal-overlay" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl p-8 max-h-[85vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h3 id="modal-title" class="text-2xl font-black text-blue-600"></h3>
            <button onclick="closeModal()" class="text-3xl text-slate-300 hover:text-slate-600">&times;</button>
        </div>
        <div id="modal-content"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
